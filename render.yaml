services:
  - type: web
    name: raws-api
    runtime: node
    rootDir: keeper
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: STELLAR_NETWORK
        value: mainnet
      - key: STELLAR_RPC_URL
        value: "https://rpc.ankr.com/stellar_soroban"
      - key: STELLAR_HORIZON_URL
        value: "https://horizon.stellar.org"
      - key: STELLAR_NETWORK_PASSPHRASE
