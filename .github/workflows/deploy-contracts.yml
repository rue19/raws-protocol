name: Deploy Contracts to Testnet

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/deploy-contracts.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
        timeout-minutes: 20

      - name: Run contract tests
        working-directory: contracts
        run: cargo test

      - name: Build contracts
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Optimize WASM
        working-directory: contracts
        run: stellar contract optimize --wasm target/wasm32-unknown-unknown/release/raws_vault.wasm

      - name: Deploy vault to testnet
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015"
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/raws_vault.optimized.wasm \
            --source "$DEPLOYER_SECRET_KEY" \
            --network testnet
