name: Deploy to Mainnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy to mainnet'
        required: true

jobs:
  deploy:
    if: inputs.confirm == 'YES'
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
        timeout-minutes: 20

      - name: Run contract tests
        working-directory: contracts
        run: cargo test

      - name: Build contracts
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Optimize WASM
        working-directory: contracts
        run: |
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/raws_vault.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/raws_amm.wasm

      - name: Configure mainnet
        working-directory: contracts
        run: |
          stellar network add mainnet \
            --rpc-url https://mainnet.stellar.org/soroban/rpc \
            --network-passphrase "Public Global Stellar Network ; September 2015"

      - name: Deploy vault
        id: deploy-vault
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
        run: |
          VAULT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/raws_vault.optimized.wasm \
            --source "$DEPLOYER_SECRET_KEY" \
            --network mainnet)
          echo "vault_contract_id=$VAULT_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::Vault deployed: $VAULT_ID"

      - name: Deploy AMM
        id: deploy-amm
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
        run: |
          AMM_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/raws_amm.optimized.wasm \
            --source "$DEPLOYER_SECRET_KEY" \
            --network mainnet)
          echo "amm_contract_id=$AMM_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::AMM deployed: $AMM_ID"

      - name: Initialize vault
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
          DEPLOYER_PUBLIC_KEY: ${{ secrets.MAINNET_DEPLOYER_PUBLIC_KEY }}
          KEEPER_PUBLIC_KEY: ${{ secrets.MAINNET_KEEPER_PUBLIC_KEY }}
        run: |
          stellar contract invoke \
            --id "${{ steps.deploy-vault.outputs.vault_contract_id }}" \
            --source "$DEPLOYER_SECRET_KEY" \
            --network mainnet \
            -- initialize \
            --admin "$DEPLOYER_PUBLIC_KEY" \
            --keeper "$KEEPER_PUBLIC_KEY" \
            --mode SafeMode

      - name: Set Soroswap router on vault
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
          DEPLOYER_PUBLIC_KEY: ${{ secrets.MAINNET_DEPLOYER_PUBLIC_KEY }}
          SOROSWAP_ROUTER_ADDRESS: ${{ secrets.MAINNET_SOROSWAP_ROUTER_ADDRESS }}
        run: |
          stellar contract invoke \
            --id "${{ steps.deploy-vault.outputs.vault_contract_id }}" \
            --source "$DEPLOYER_SECRET_KEY" \
            --network mainnet \
            -- set_soroswap_router \
            --caller "$DEPLOYER_PUBLIC_KEY" \
            --router "$SOROSWAP_ROUTER_ADDRESS"

      - name: Set AMM address on vault
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
          DEPLOYER_PUBLIC_KEY: ${{ secrets.MAINNET_DEPLOYER_PUBLIC_KEY }}
        run: |
          stellar contract invoke \
            --id "${{ steps.deploy-vault.outputs.vault_contract_id }}" \
            --source "$DEPLOYER_SECRET_KEY" \
            --network mainnet \
            -- set_amm_address \
            --caller "$DEPLOYER_PUBLIC_KEY" \
            --amm "${{ steps.deploy-amm.outputs.amm_contract_id }}"

      - name: Initialize AMM
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
          DEPLOYER_PUBLIC_KEY: ${{ secrets.MAINNET_DEPLOYER_PUBLIC_KEY }}
          USDC_ADDRESS: ${{ secrets.MAINNET_USDC_ADDRESS }}
          WRAPPED_XLM_ADDRESS: ${{ secrets.MAINNET_WRAPPED_XLM_ADDRESS }}
        run: |
          stellar contract invoke \
            --id "${{ steps.deploy-amm.outputs.amm_contract_id }}" \
            --source "$DEPLOYER_SECRET_KEY" \
            --network mainnet \
            -- init \
            --token_a "$USDC_ADDRESS" \
            --token_b "$WRAPPED_XLM_ADDRESS" \
            --initial_a 5000000 \
            --initial_b 5000000 \
            --admin "$DEPLOYER_PUBLIC_KEY"

      - name: Extend TTL
        working-directory: contracts
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
        run: |
          VAULT_HASH=$(stellar contract info hash --contract-id "${{ steps.deploy-vault.outputs.vault_contract_id }}" --network mainnet | tail -1)
          AMM_HASH=$(stellar contract info hash --contract-id "${{ steps.deploy-amm.outputs.amm_contract_id }}" --network mainnet | tail -1)

          stellar contract extend --source "$DEPLOYER_SECRET_KEY" --network mainnet \
            --id "${{ steps.deploy-vault.outputs.vault_contract_id }}" --ledgers-to-extend 535679 --durability persistent
          stellar contract extend --source "$DEPLOYER_SECRET_KEY" --network mainnet \
            --id "${{ steps.deploy-amm.outputs.amm_contract_id }}" --ledgers-to-extend 535679 --durability persistent
          stellar contract extend --source "$DEPLOYER_SECRET_KEY" --network mainnet \
            --wasm-hash "$VAULT_HASH" --ledgers-to-extend 535679 --durability persistent
          stellar contract extend --source "$DEPLOYER_SECRET_KEY" --network mainnet \
            --wasm-hash "$AMM_HASH" --ledgers-to-extend 535679 --durability persistent

      - name: Summary
        run: |
          echo "## Mainnet Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | Address |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Vault | \`${{ steps.deploy-vault.outputs.vault_contract_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AMM | \`${{ steps.deploy-amm.outputs.amm_contract_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Update MAINNET_ADDRESSES.md" >> $GITHUB_STEP_SUMMARY
          echo "2. Update keeper/.env for mainnet" >> $GITHUB_STEP_SUMMARY
          echo "3. Update Render environment variables" >> $GITHUB_STEP_SUMMARY
          echo "4. Update frontend/.env.local for mainnet" >> $GITHUB_STEP_SUMMARY
          echo "5. Update Vercel environment variables" >> $GITHUB_STEP_SUMMARY
          echo "6. Execute 1 XLM smoke test deposit" >> $GITHUB_STEP_SUMMARY
